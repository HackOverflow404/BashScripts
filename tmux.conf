### KEYBINDS

# Change prefix to Ctrl+Space
unbind C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Quick reload conf file
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Split pane in current path
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"
bind "\\" split-window -fh -c "#{pane_current_path}"
bind "_" split-window -fv -c "#{pane_current_path}"

# Zoom pane toggle (no prefix) — parallel to Super+F fullscreen in Hyprland
bind -n M-f resize-pane -Z

# Kill pane with confirmation (no prefix) — parallel to Super+Q kill window in Hyprland
bind -n M-q confirm-before kill-pane

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# New window/pane keeps current path
bind c new-window -c "#{pane_current_path}"

# Switch between last window / last session
bind Space last-window
bind C-Space switch-client -l

# Join panes via custom key table (prefix+j, then | or _)
bind j switch-client -T join-mode
bind -T join-mode _ choose-window "join-pane -h -s '%%'"
bind -T join-mode \| choose-window "join-pane -s '%%'"
bind -T join-mode q switch-client -T root

# Switch panes with Alt+arrow (no prefix) — parallel to Super+arrow focus in Hyprland
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Swap pane with adjacent (no prefix) — parallel to Super+Shift+arrow move window in Hyprland
bind -n M-S-Left  swap-pane -t '{left-of}'
bind -n M-S-Right swap-pane -t '{right-of}'
bind -n M-S-Up    swap-pane -t '{up-of}'
bind -n M-S-Down  swap-pane -t '{down-of}'

# Resize pane (after prefix) — parallel to Super+Alt+arrow resize window in Hyprland
bind -r M-Left  resize-pane -L 5
bind -r M-Right resize-pane -R 5
bind -r M-Up    resize-pane -U 1
bind -r M-Down  resize-pane -D 1

# Next/prev window with Ctrl+Alt+arrow (no prefix) — parallel to Ctrl+Super+arrow workspace nav in Hyprland
bind -n C-M-Left  previous-window
bind -n C-M-Right next-window

# Move current pane to prev/next window (no prefix) — parallel to Super+Alt+arrow move-to-workspace in Hyprland
bind -n C-M-S-Left  join-pane -t :-1
bind -n C-M-S-Right join-pane -t :+1


### OPTIONS

# Terminal and color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Preserve terminal transparency (foot alpha) inside panes.
# `terminal` emits the real terminal default bg (SGR 49) so foot's alpha
# applies; plain `default` can paint an opaque bg that breaks transparency.
set -g window-style        "bg=terminal"
set -g window-active-style "bg=terminal"

# Set active pane border
set-option -g pane-active-border-style fg=blue

# Default shell
set-option -g default-shell   /usr/bin/zsh
set-option -g default-command /usr/bin/zsh

# Mouse support
set -g mouse on

# History and timing
set -g history-limit  5000
set -g display-time   3000

# Status bar refresh interval
set -g status-interval 5

# Emacs keys in command prompt
set -g status-keys emacs

# Focus events for terminals that support them
set -g focus-events on

# Resize to smallest attached client per window (not per session)
setw -g aggressive-resize on

# Auto-renumber windows when one is closed
set -g renumber-windows on


### COPY & SCROLL

# Emacs-style keys in copy mode
setw -g mode-keys emacs

# Mouse drag to copy — pipes directly to clipboard on release
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Scroll up enters copy mode automatically (scoped to the hovered pane)
bind -n WheelUpPane \
    if-shell -F "#{mouse_any_flag}" "send-keys -M" \
    "if-shell -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# Scroll down at the bottom exits copy mode automatically
bind -n WheelDownPane \
    if-shell -F "#{pane_in_mode}" \
    "if-shell -Ft= '#{?pane_at_bottom,true,false}' 'send-keys -X cancel' 'send-keys -M'" \
    "send-keys -M"

# 3 lines per scroll tick
bind -T copy-mode WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 3 scroll-down

# Click to focus pane without dropping selection
bind -T copy-mode MouseDown1Pane select-pane \; send-keys -X clear-selection

# Paste buffer
bind p paste-buffer


### STATUS BAR

set -g status-position bottom
set -g status-justify  centre
set -g status-style    "bg=#161616 fg=#555555"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#aaaaaa]#S"

# Center: window list
set -g window-status-format          "#[fg=#444444] #W "
set -g window-status-current-format  "#[fg=#cccccc,underscore] #W "
set -g window-status-separator       ""

# Right: focused pane path (full, no truncation)
set -g status-right-length 200
set -g status-right "#[fg=#666666]#{pane_current_path}"

# Pane borders
set -g pane-border-style        "fg=#2e2e2e"
set -g pane-active-border-style "fg=#555555"

# Command prompt
set -g message-style         "bg=#2e2e2e fg=#cccccc"
set -g message-command-style "bg=#2e2e2e fg=#888888"
